name: Robo Binance CI

on:
  push:
    branches:
      - main
      - antigravity-dev
      - claude-dev
      - v0-dev
      - lovable-dev

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test